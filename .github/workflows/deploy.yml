name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2201
          script: |
            set -e

            echo "🚀 Start Deploy"

            cd /var/www/storetrace

            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            export NEXT_PUBLIC_GA_ID=G-8GPRHS183R

            # Full install (not --production): next build needs devDependencies
            # (typescript, tailwindcss, postcss, autoprefixer, eslint-config-next, …).
            npm install
            npm run build

            if pm2 describe storetrace >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs
            fi

            pm2 save

            echo "✅ Deploy Done"
